apiVersion: v1
kind: ConfigMap
metadata:
  name: alloy-config
  namespace: monitoring
data:
  config.alloy: |

    // --- Kubernetes Pod Logs -> Loki ---

    discovery.kubernetes "pods" {
      role = "pod"
    }

    discovery.relabel "pod_logs" {
      targets = discovery.kubernetes.pods.targets

      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_container_name"]
        target_label  = "container"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_label_app"]
        target_label  = "app"
      }
    }

    loki.source.kubernetes "pod_logs" {
      targets    = discovery.relabel.pod_logs.output
      forward_to = [loki.write.loki.receiver]
    }

    loki.write "loki" {
      endpoint {
        url = "http://<LGTM-HOST>:3100/loki/api/v1/push"
      }
    }

    // --- Kubernetes Pod Metriken -> Prometheus ---

    discovery.kubernetes "services" {
      role = "pod"
    }

    discovery.relabel "metrics" {
      targets = discovery.kubernetes.services.targets

      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_scrape"]
        action        = "keep"
        regex         = "true"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_annotation_prometheus_io_path"]
        target_label  = "__metrics_path__"
        regex         = "(.+)"
      }
      rule {
        source_labels = ["__address__", "__meta_kubernetes_pod_annotation_prometheus_io_port"]
        target_label  = "__address__"
        regex         = "([^:]+)(?::\\d+)?;(\\d+)"
        replacement   = "$1:$2"
      }
      rule {
        source_labels = ["__meta_kubernetes_namespace"]
        target_label  = "namespace"
      }
      rule {
        source_labels = ["__meta_kubernetes_pod_name"]
        target_label  = "pod"
      }
    }

    prometheus.scrape "pods" {
      targets    = discovery.relabel.metrics.output
      forward_to = [prometheus.remote_write.prometheus.receiver]
    }

    // --- Kubernetes Node Metriken (kubelet / cAdvisor) ---

    prometheus.scrape "kubelet" {
      targets = [{
        __address__ = env("NODE_IP") + ":10250",
      }]
      scheme           = "https"
      tls_config {
        insecure_skip_verify = true
      }
      bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
      metrics_path      = "/metrics"
      forward_to        = [prometheus.remote_write.prometheus.receiver]
    }

    prometheus.scrape "cadvisor" {
      targets = [{
        __address__ = env("NODE_IP") + ":10250",
      }]
      scheme           = "https"
      tls_config {
        insecure_skip_verify = true
      }
      bearer_token_file = "/var/run/secrets/kubernetes.io/serviceaccount/token"
      metrics_path      = "/metrics/cadvisor"
      forward_to        = [prometheus.remote_write.prometheus.receiver]
    }

    prometheus.remote_write "prometheus" {
      endpoint {
        url = "http://<LGTM-HOST>:9090/api/v1/write"
      }
    }

    // --- Traces: OTLP Receiver -> Tempo ---

    otelcol.receiver.otlp "otlp" {
      grpc { endpoint = "0.0.0.0:4317" }
      http { endpoint = "0.0.0.0:4318" }
      output {
        traces = [otelcol.exporter.otlp.tempo.input]
      }
    }

    otelcol.exporter.otlp "tempo" {
      client {
        endpoint = "<LGTM-HOST>:4317"
        tls { insecure = true }
      }
    }
